name: Send Followups

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Function
        run: |
          curl -X GET https://umouqdubdlqaofqukawa.supabase.co/functions/v1/send-followups \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
